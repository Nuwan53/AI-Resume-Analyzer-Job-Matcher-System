<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Resume AI Analyzer{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink-900: #1a2230;
            --ink-700: #2f3e52;
            --ink-500: #58677a;
            --paper-100: #f6f3ea;
            --paper-200: #efe8dc;
            --paper-300: #e2d4bc;
            --brand-700: #0f766e;
            --brand-600: #12877e;
            --accent-600: #b45309;
            --accent-500: #c86410;
            --ok-100: #dff6ec;
            --ok-700: #1b6b48;
            --danger-100: #ffe4df;
            --danger-700: #8f2f24;
            --line: #d8ccb8;
            --shadow-lg: 0 16px 38px rgba(20, 26, 34, 0.12);
            --shadow-sm: 0 8px 20px rgba(20, 26, 34, 0.08);
            --radius-lg: 20px;
            --radius-md: 12px;
            --space-1: 0.5rem;
            --space-2: 0.75rem;
            --space-3: 1rem;
            --space-4: 1.5rem;
            --space-5: 2rem;
            --space-6: 3rem;
            --max-content: 1140px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Manrope', 'Segoe UI', sans-serif;
            background: radial-gradient(circle at 0% 0%, #f4ead6 0%, transparent 30%),
                        radial-gradient(circle at 100% 100%, #e2efe7 0%, transparent 28%),
                        linear-gradient(180deg, #fbf8f1 0%, #f6f0e4 60%, #f8f3eb 100%);
            color: var(--ink-900);
            min-height: 100vh;
            line-height: 1.6;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: linear-gradient(rgba(39, 52, 69, 0.04) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(39, 52, 69, 0.04) 1px, transparent 1px);
            background-size: 34px 34px;
            pointer-events: none;
            z-index: -1;
        }

        header {
            position: sticky;
            top: 0;
            z-index: 5;
            backdrop-filter: blur(8px);
            background: rgba(251, 248, 241, 0.86);
            border-bottom: 1px solid var(--line);
        }

        .nav-wrap {
            max-width: var(--max-content);
            margin: 0 auto;
            padding: var(--space-3);
        }

        nav {
            display: flex;
            flex-wrap: wrap;
            gap: var(--space-3);
            align-items: center;
            justify-content: space-between;
        }

        .nav-links {
            display: flex;
            gap: var(--space-2);
            flex-wrap: wrap;
        }

        nav a {
            color: var(--ink-700);
            text-decoration: none;
            font-weight: 600;
            border-radius: 999px;
            padding: 0.45rem 0.85rem;
            transition: background-color 0.2s ease, color 0.2s ease;
        }

        nav a:hover {
            background: rgba(15, 118, 110, 0.12);
            color: var(--brand-700);
        }

        nav a:focus-visible,
        .btn:focus-visible,
        input:focus-visible,
        textarea:focus-visible {
            outline: 3px solid rgba(15, 118, 110, 0.35);
            outline-offset: 2px;
        }

        .brand {
            font-family: 'Fraunces', Georgia, serif;
            font-size: clamp(1.25rem, 3vw, 1.7rem);
            color: var(--ink-900);
            letter-spacing: 0.02em;
        }

        .container {
            max-width: var(--max-content);
            margin: var(--space-5) auto;
            padding: 0 var(--space-3);
        }

        .page-headline {
            font-family: 'Fraunces', Georgia, serif;
            font-size: clamp(2rem, 4.2vw, 3rem);
            line-height: 1.08;
            margin-bottom: 0.5rem;
        }

        .muted {
            color: var(--ink-500);
        }

        .surface {
            background: linear-gradient(180deg, #fffcf6 0%, #fffaf2 100%);
            border: 1px solid var(--line);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            padding: clamp(1.2rem, 2.2vw, 1.9rem);
        }

        .surface.soft {
            box-shadow: var(--shadow-sm);
        }

        .messages {
            margin-bottom: var(--space-4);
        }

        .message {
            padding: var(--space-3);
            margin-bottom: var(--space-2);
            border-radius: var(--radius-md);
            border: 1px solid transparent;
            animation: riseIn 0.35s ease;
        }

        .message.success {
            background: var(--ok-100);
            color: var(--ok-700);
            border-color: #bde8d4;
        }

        .message.error {
            background: var(--danger-100);
            color: var(--danger-700);
            border-color: #f2beb4;
        }

        @keyframes riseIn {
            from {
                transform: translateY(14px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        h1 {
            margin-bottom: var(--space-2);
            color: var(--ink-900);
            font-family: 'Fraunces', Georgia, serif;
            font-size: clamp(1.8rem, 3.8vw, 2.5rem);
        }

        h2 {
            margin-top: var(--space-4);
            margin-bottom: var(--space-2);
            color: var(--ink-700);
            font-family: 'Fraunces', Georgia, serif;
            font-size: clamp(1.2rem, 2.6vw, 1.8rem);
        }

        h3 {
            font-size: 1.05rem;
            color: var(--ink-700);
            letter-spacing: 0.01em;
        }

        .btn-row {
            display: flex;
            gap: var(--space-2);
            flex-wrap: wrap;
        }

        .btn {
            display: inline-block;
            padding: 0.7rem 1.25rem;
            background: linear-gradient(135deg, var(--brand-700), var(--brand-600));
            color: white;
            text-decoration: none;
            border-radius: 999px;
            border: none;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 700;
            letter-spacing: 0.01em;
            transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
            box-shadow: 0 8px 18px rgba(18, 135, 126, 0.3);
        }

        .btn:hover {
            transform: translateY(-1px);
            filter: brightness(1.03);
        }

        .btn.secondary {
            background: #fff6ea;
            color: var(--accent-600);
            border: 1px solid #f2d2a9;
            box-shadow: none;
        }

        .btn.secondary:hover {
            background: #ffefdd;
            transform: translateY(-1px);
        }

        .meta {
            color: var(--ink-500);
            font-size: 0.95rem;
        }

        .grid {
            display: grid;
            gap: var(--space-3);
        }

        input[type='file'] {
            width: 100%;
            padding: 0.75rem;
            background: #fff;
            border: 1px solid var(--line);
            border-radius: var(--radius-md);
            color: var(--ink-700);
        }

        footer {
            color: var(--ink-500);
            text-align: center;
            padding: var(--space-5) var(--space-3);
            margin-top: var(--space-6);
            border-top: 1px solid var(--line);
            background: rgba(255, 251, 244, 0.62);
        }

        @media (max-width: 820px) {
            .nav-wrap {
                padding: var(--space-2) var(--space-3);
            }

            nav {
                align-items: flex-start;
            }

            .nav-links {
                width: 100%;
            }

            .btn {
                width: 100%;
                text-align: center;
            }
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <header>
        <div class="nav-wrap">
            <nav>
                <a href="{% url 'home' %}" class="brand">Resume AI Analyzer</a>
                <div class="nav-links">
                    <a href="{% url 'upload_resume' %}">Upload Resume</a>
                    <a href="{% url 'resume_list' %}">View Resumes</a>
                    <a href="{% url 'job_list' %}">View Jobs</a>
                </div>
            </nav>
        </div>
    </header>

    <div class="container">
        {% if messages %}
            <div class="messages">
                {% for message in messages %}
                    <div class="message {% if message.tags %}{{ message.tags }}{% endif %}">
                        {{ message }}
                    </div>
                {% endfor %}
            </div>
        {% endif %}

        {% block content %}{% endblock %}
    </div>

    <footer>
        <p>&copy; 2026 Resume AI Analyzer</p>
    </footer>
</body>
</html>
